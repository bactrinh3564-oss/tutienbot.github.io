<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Tu Tiên</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    color:#38bdf8;
}

.box{
    background:#1e293b;
    padding:30px;
    margin:40px auto;
    width:300px;
    border-radius:10px;
}

button{
    padding:12px 25px;
    font-size:18px;
    background:#38bdf8;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>⚔️ GAME TU TIÊN ⚔️</h1>

<div class="box">

<p>Cảnh giới:</p>
<h2 id="rank">Phàm Nhân</h2>

<p>Linh lực:</p>
<h3 id="power">0</h3>

<button onclick="train()">Tu Luyện</button>

</div>

<script>

let power = 0

function train(){

power += 10

document.getElementById("power").innerText = power

if(power >= 50){
document.getElementById("rank").innerText="Luyện Khí"
}

if(power >= 150){
document.getElementById("rank").innerText="Trúc Cơ"
}

if(power >= 300){
document.getElementById("rank").innerText="Kim Đan"
}

if(power >= 600){
document.getElementById("rank").innerText="Nguyên Anh"
}

}

</script>

</body>
</html>
